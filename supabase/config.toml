# Cody Codes App Suite — linked to production Supabase project nxaidsisoauzhpdkaixm
project_id = "cody-codes"

[remotes.production]
project_id = "nxaidsisoauzhpdkaixm"

[api]
enabled = true
port = 54321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
